admin:
  mask: "8.0.0"
  description: |
    This role is assigned to system administrators
    who have access to all organizations and projects.
  assignable: true
  rights:
    # Login
    - "iam:accounts.login.*"
    - "iam:accounts.logout.*"

    # Accounts
    - "iam:accounts.create.*"
    - "iam:accounts.update.*"
    - "iam:accounts.read.*"

    # Organizations
    - "iam:organizations.read.*"
    - "iam:organizations.update.*"
    - "iam:accounts.create.*"

    # API Keys
    - "iam:api_keys.create.{account_ro_all, account_rw_all, org_ro_all, org_rw_all, project_ro_org, project_rw_org, org_ro_own, project_ro_all, project_rw_all}"
    - "iam:api_keys.read.*"
    - "iam:api_keys.update.*"
    - "iam:api_keys.delete.*"

    # Dataset Service
    - "dataset:projects.read.*"
    - "dataset:projects.update.*"
    - "dataset:projects.delete.*"
    - "dataset:project_members.*.*"
    - "dataset:datasets.*.*"
    - "dataset:entries.*.*"
    - "dataset:annotations.*.*"
    - "dataset:note_feeds.*.*"
    - "dataset:note_comments.*.*"

    # Media Service
    - "media:medias.*.*"
    - "media:jobs.read.*"

    # Setting Service
    - "setting:account_settings.*.*"

    # Sync Service
    - "sync:jobs.read.*"
    - "sync:exports.read.*"
    - "sync:exports.create.*"
