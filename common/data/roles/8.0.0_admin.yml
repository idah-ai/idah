admin:
  mask: "8.0.0"
  description: |
    This role is assigned to system administrators
    who have access to all organizations and projects.
  assignable: true
  rights:
    # Accounts
    - "iam:accounts.*.*"

    # Organizations
    - "iam:organizations.*.*"

    # API Keys
    - "iam:api_keys.create.{account_ro_all, account_rw_all, org_ro_all, org_rw_all, project_ro_org, project_rw_org, org_ro_org, org_rw_org, project_ro_all, project_rw_all}"
    - "iam:api_keys.read.*"
    - "iam:api_keys.update.*"
    - "iam:api_keys.delete.*"

    # Dataset Service
    - "dataset:projects.*.*"
    - "dataset:project_members.*.*"
    - "dataset:datasets.*.*"
    - "dataset:entries.*.*"
    - "dataset:annotations.*.*"
    - "dataset:note_feeds.*.*"
    - "dataset:note_comments.*.*"
    - "dataset:entry_stats.read.*"

    # Media Service
    - "media:medias.*.*"
    - "media:jobs.*.*"

    # Setting Service
    - "setting:account_settings.*.*"

    # Sync Service
    - "sync:jobs.read.*"
    - "sync:exports.read.*"
    - "sync:exports.create.*"

    # Audit Service
    - "audit:logs.read.*"
