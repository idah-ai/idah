api/account_ro_all:
  title: "API - Account Read Only"
  mask: "1.0.9"
  description: |
    API role for read-only access to account resources.
    This scope is compoundable, meaning a role for api can be defined as "api:account_ro_all,project_rw_org".
  assignable: false
  rights:
    # Accounts
    - "iam:accounts.read.*"
