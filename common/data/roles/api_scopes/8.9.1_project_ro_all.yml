api/project_ro_all:
  title: "API - Project Read Only"
  mask: "8.9.1"
  description: |
    Allow access to read project resources.
  assignable: false
  rights:
    # Dataset Service - Read Only (Project level)
    - "dataset:projects.read.*"
    - "dataset:project_members.read.*"
    - "dataset:datasets.read.*"
    - "dataset:entries.read.*"
    - "dataset:annotations.read.*"
    - "dataset:note_feeds.read.*"
    - "dataset:note_comments.read.*"

    # Media Service - Read Only (Project level)
    - "media:medias.read.*"
    - "media:jobs.read.*"
