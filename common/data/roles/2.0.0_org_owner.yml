org_owner:
  mask: "2.0.0"
  description: |
    This role is assigned to organization owners
    who have access to all projects within their organization.
  assignable: true
  rights:
    # Login
    - "iam:accounts.login.*"
    - "iam:accounts.logout.*"
    - "iam:account_sessions.delete.*" # TODO: Implement scope self

    # Accounts
    - "iam:accounts.read.*"

    # Organizations
    # TODO: review org scope; owned ?
    - "iam:organizations.read.*"

    # Dataset Service
    - "dataset:projects.*.as_org_owner"
    - "dataset:project_members.*.as_org_owner"
    - "dataset:datasets.*.as_org_owner"
    - "dataset:entries.*.as_org_owner"
