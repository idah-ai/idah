user:
  mask: "1.0.0"
  description: |
    This role is assigned to registered users
    who have access to their own projects.
  assignable: true
  rights:
    # Login
    - "iam:accounts.login.*"
    - "iam:accounts.logout.*"

    # Accounts
    - "iam:accounts.create.*"
    - "iam:accounts.update.own"
    - "iam:accounts.read.*"

    # Organizations
    - "iam:organizations.read.as_user"

    # Dataset Service
    - "dataset:projects.read.as_user"
    - "dataset:projects.update.as_user"
    - "dataset:projects.delete.as_user"
    - "dataset:project_members.*.as_user"
    - "dataset:datasets.*.as_user"
    - "dataset:entries.*.as_user"
    - "dataset:annotations.*.as_user"
    - "dataset:note_feeds.*.as_user"
    - "dataset:note_comments.*.as_user"

    # Media Service
    - "media:medias.*.as_user"
    - "media:jobs.read.as_user"

    # Setting Service
    - "setting:account_settings.*.own"

    # Sync Service
    - "sync:jobs.export.as_user"
    - "sync:jobs.read.as_user"
    - "sync:exports.read.as_org_owner"
