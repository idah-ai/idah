services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./dev/nginx/nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - ./dev/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - media
      - dataset
      - iam
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGHOST: /var/run/postgresql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  iam:
    build:
      context: ./app/iam
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_iam_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/iam:/app
      - ./app/iam/common:/app/common
      - ./dev/nginx/ssl/cert.pem:/etc/ssl/certs/ca-certificates.crt
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  media:
    build:
      context: ./app/media
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_media_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/media:/app
      - ./app/media/common:/app/common
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  dataset:
    build:
      context: ./app/dataset
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_dataset_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/dataset:/app
      - ./app/dataset/common:/app/common
      - ./dev/nginx/ssl/cert.pem:/etc/ssl/certs/ca-certificates.crt
      - bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    environment:
      VITE_IDAH_HOST: http://localhost:8080
    ports:
      - "5173"
    volumes:
      - ./app/frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - app-network
    command: pnpm run dev  --host
    stdin_open: true
    tty: true

volumes:
  bundler_cache:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
