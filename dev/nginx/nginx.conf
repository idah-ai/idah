events {
  worker_connections 1024;
}

http {
  # Docker's embedded DNS server. Using a resolver together with variables in
  # proxy_pass forces nginx to re-resolve upstream hostnames per request instead
  # of caching the container IP at startup. This prevents 502s when a container
  # (e.g. the Vite frontend) is recreated and gets a new IP on the network.
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
          default upgrade;
          ''      close;
      }

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name idah.localhost;
    return 301 https://$server_name:8443$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    http2  on;
    server_name idah.localhost;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # IAM microservice
    location /api/v1/iam {
      set $iam_upstream iam:3000;
      rewrite ^/api/v1/iam/?(.*) /$1 break;
      proxy_pass http://$iam_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Audit microservice
    location /api/v1/audit {
      set $audit_upstream audit:3000;
      rewrite ^/api/v1/audit/?(.*) /$1 break;
      proxy_pass http://$audit_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Setting microservice
    location /api/v1/setting {
      set $setting_upstream setting:3000;
      rewrite ^/api/v1/setting/?(.*) /$1 break;
      proxy_pass http://$setting_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Notification microservice
    location /api/v1/notification {
      set $notification_upstream notification:3000;
      rewrite ^/api/v1/notification/?(.*) /$1 break;
      proxy_pass http://$notification_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Media microservice
    location /api/v1/media {
      set $media_upstream media:3000;
      rewrite ^/api/v1/media/?(.*) /$1 break;

      # Allow video uploads up to 2GB
      client_body_buffer_size 128k;
      client_max_body_size 2G;
      client_body_timeout 300s;

      proxy_pass http://$media_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Sync microservice
    location /api/v1/sync {
      set $sync_upstream sync:3000;
      rewrite ^/api/v1/sync/?(.*) /$1 break;
      proxy_pass http://$sync_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Dataset microservice
    location /api/v1/dataset {
      set $dataset_upstream dataset:3000;
      rewrite ^/api/v1/dataset/?(.*) /$1 break;
      proxy_pass http://$dataset_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # MailHog Web UI for development
    location /mails/ {
      set $mails_upstream mails:8025;
      rewrite ^/mails/(.*) /$1 break;
      proxy_pass http://$mails_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_redirect off;
    }

    location = /mails {
      return 301 /mails/;
    }

    location / {
      set $frontend_upstream frontend:5173;
      proxy_pass http://$frontend_upstream;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }


    # Health check endpoint
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}
