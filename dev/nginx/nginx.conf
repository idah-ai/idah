events {
  worker_connections 1024;
}

http {
  upstream iam_service {
    server iam:3000;
  }

  upstream audit_service {
    server audit:3000;
  }

  upstream setting_service {
    server setting:3000;
  }

  upstream notification_service {
    server notification:3000;
  }

  upstream media_service {
    server media:3000;
  }

  upstream sync_service {
    server sync:3000;
  }

  upstream dataset_service {
    server dataset:3000;
  }

  upstream frontend_service {
    server frontend:5173;
  }

  upstream mails_service {
    server mails:8025;
  }

  map $http_upgrade $connection_upgrade {
          default upgrade;
          ''      close;
      }

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name idah.localhost;
    return 301 https://$server_name:8443$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    http2  on;
    server_name idah.localhost;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # IAM microservice
    location /api/v1/iam {
      rewrite ^/api/v1/iam/?(.*) /$1 break;
      proxy_pass http://iam_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Audit microservice
    location /api/v1/audit {
      rewrite ^/api/v1/audit/?(.*) /$1 break;
      proxy_pass http://audit_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Setting microservice
    location /api/v1/setting {
      rewrite ^/api/v1/setting/?(.*) /$1 break;
      proxy_pass http://setting_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Notification microservice
    location /api/v1/notification {
      rewrite ^/api/v1/notification/?(.*) /$1 break;
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Media microservice
    location /api/v1/media {
      rewrite ^/api/v1/media/?(.*) /$1 break;

      # Allow video uploads up to 2GB
      client_body_buffer_size 128k;
      client_max_body_size 2G;
      client_body_timeout 300s;

      proxy_pass http://media_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Sync microservice
    location /api/v1/sync {
      rewrite ^/api/v1/sync/?(.*) /$1 break;
      proxy_pass http://sync_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Dataset microservice
    location /api/v1/dataset {
      rewrite ^/api/v1/dataset/?(.*) /$1 break;
      proxy_pass http://dataset_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # MailHog Web UI for development
    location /mails/ {
      rewrite ^/mails/(.*) /$1 break;
      proxy_pass http://mails_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_redirect off;
    }

    location = /mails {
      return 301 /mails/;
    }

    location / {
      proxy_pass http://frontend_service;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }


    # Health check endpoint
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}
