events {
  worker_connections 1024;
}

http {
  upstream iam_service {
    server iam:3000;
  }

  upstream media_service {
    server media:3000;
  }

  upstream setting_service {
    server setting:3000;
  }

  upstream dataset_service {
    server dataset:3000;
  }

  upstream frontend_service {
    server frontend:3000;
  }

  map $http_upgrade $connection_upgrade {
          default upgrade;
          ''      close;
      }

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name idah.ingedata.ai;

    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    proxy_busy_buffers_size 64k;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # iam microservice
    location /api/v1/iam {
      rewrite ^/api/v1/iam/?(.*) /$1 break;
      proxy_pass http://iam_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Media microservice
    location /api/v1/media {
      rewrite ^/api/v1/media/?(.*) /$1 break;

      # Allow video uploads up to 2GB
      client_body_buffer_size 128k;
      client_max_body_size 2G;
      client_body_timeout 300s;

      proxy_pass http://media_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Dataset microservice
    location /api/v1/dataset {
      rewrite ^/api/v1/dataset/?(.*) /$1 break;
      proxy_pass http://dataset_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    # Setting microservice
    location /api/v1/setting {
      rewrite ^/api/v1/setting/?(.*) /$1 break;
      proxy_pass http://setting_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location / {
      proxy_pass http://frontend_service;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;

      auth_basic "Restricted Area";
      auth_basic_user_file /etc/nginx/.htpasswd;
    }


    # Health check endpoint
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}