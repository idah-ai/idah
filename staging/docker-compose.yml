  frontend:
    build:
      context: ../.
      dockerfile: ./staging/Dockerfile.frontend
    ports:
      - "3000"
    volumes:
      - frontend_build:/app/frontend/build
    networks:
      - app-network
    stdin_open: true
    tty: true

volumes:
  frontend_build:
  bundler_cache:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
