services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - media
      - dataset
      - iam
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGHOST: /var/run/postgresql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  iam:
    build:
      context: ../app/iam
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    cpus: 0.5
    mem_limit: 2g
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_iam_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
      - IDAH_SERVICE_ACCOUNT=iam@services.idah.ai
      - IDAH_SERVICE_PASSWORD=EJvTU9fFRao4iNT911Lh90z
    ports:
      - "3000"
    volumes:
      - ../app/iam:/app
      - ../app/iam/common:/app/common
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  media:
    build:
      context: ../app/media
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    cpus: 0.6
    mem_limit: 3g
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_media_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
      - IDAH_SERVICE_ACCOUNT=media@services.idah.ai
      - IDAH_SERVICE_PASSWORD=EJvTU9fFRao4iNT911Lh90z
    ports:
      - "3000"
    volumes:
      - ../app/media:/app
      - ../app/media/common:/app/common
      - ../plugins:/app/plugins
      - frontend_build:/app/plugins/idah-video/frontend/build
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

