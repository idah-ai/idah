services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - media
      - dataset
      - iam
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: postgres_db
    restart: always
    env_file:
      - ./config/envs/.env.postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  iam:
    build:
      context: ../app/iam
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.iam
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/iam:/app
      - ../app/iam/common:/app/common
      - ./config/keys/private.staging.pem:/app/config/keys/private.staging.pem:ro
      - iam_bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  media:
    build:
      context: ../app/media
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.media
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/media:/app
      - ../app/media/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - ../plugins:/app/plugins
      - frontend_build:/app/plugins/idah-video/frontend/build
      - media_bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  dataset:
    build:
      context: ../app/dataset
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.dataset
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/dataset:/app
      - ../app/dataset/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - dataset_bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  notification:
    build:
      context: ../app/notification
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.notification
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/notification:/app
      - ../app/notification/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - notification_bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  audit:
    build:
      context: ../app/audit
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.audit
    restart: always
    ports:
      - "3000"
    volumes:
      - ../app/audit:/app
      - ../app/audit/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - audit_bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  sync:
    build:
      context: ../.
      dockerfile: ./app/sync/Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.sync
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/sync:/app
      - ../app/sync/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - ../plugins:/app/plugins
      - sync_bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  setting:
    build:
      context: ../app/setting
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: staging
    env_file:
      - ./config/envs/.env.postgres
      - ./config/envs/.env.common
      - ./config/envs/.env.setting
    restart: always
    cpus: 0.5
    mem_limit: 2g
    ports:
      - "3000"
    volumes:
      - ../app/setting:/app
      - ../app/setting/common:/app/common
      - ./config/keys/public.staging.pem:/app/config/keys/public.staging.pem:ro
      - ../plugins:/app/plugins
      - frontend_build:/app/plugins/idah-video/frontend/build
      - setting_bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    depends_on:
      - frontend
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ../.
      dockerfile: ./staging/Dockerfile.frontend
    restart: always
    ports:
      - "3000"
    volumes:
      - frontend_build:/app/frontend/build
    networks:
      - app-network
    stdin_open: true
    tty: true

volumes:
  frontend_build:
  iam_bundler_cache:
  media_bundler_cache:
  dataset_bundler_cache:
  setting_bundler_cache:
  audit_bundler_cache:
  sync_bundler_cache:
  notification_bundler_cache:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
