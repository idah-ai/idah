services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./dev/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dev/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - media
      - dataset
      - iam
      - setting
      - audit
      - sync
      - notification
      - mails
    networks:
      - app-network

  iam:
    build:
      context: ./app/iam
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/iam:/app
      - ./app/iam/common:/app/common
      - ./dev/nginx/ssl/cert.pem:/etc/ssl/certs/ca-certificates.crt
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  media:
    build:
      context: ./app/media
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/media:/app
      - ./app/media/common:/app/common
      - ./plugins:/app/plugins
      - ./app/frontend/build:/app/plugins/idah-video/frontend/build
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true
    depends_on:
      - dataset

  dataset:
    build:
      context: ./app/dataset
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/dataset:/app
      - ./app/dataset/common:/app/common
      - ./dev/nginx/ssl/cert.pem:/etc/ssl/certs/ca-certificates.crt
      - bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  setting:
    build:
      context: ./app/setting
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/setting:/app
      - ./app/setting/common:/app/common
      - ./plugins:/app/plugins
      - ./app/frontend/build:/app/plugins/idah-video/frontend/build
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  audit:
    build:
      context: ./app/audit
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
