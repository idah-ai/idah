    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  mails:
    image: mailhog/mailhog
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    environment:
      VITE_IDAH_HOST: https://idah.localhost:8443
    ports:
      - "5173"
    volumes:
      - ./app/frontend:/app/frontend
      - node_modules:/app/frontend/node_modules
    networks:
      - app-network
    command: pnpm run dev
    stdin_open: true
    tty: true

volumes:
  bundler_cache:
  node_modules:

networks:
  app-network:
    driver: bridge
