services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./dev/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dev/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - media
      - dataset
    networks:
      - app-network
  media:
    build:
      context: ./app/media
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_media_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/media:/app
      - ./app/media/common:/app/common
      - bundler_cache:/usr/local/bundle
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true
  dataset:
    build:
      context: ./app/dataset
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - DATABASE_URI=postgres://postgres:postgres@host.docker.internal:5432/idah_dataset_development
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
      - "3000"
    volumes:
      - ./app/dataset:/app
      - ./app/dataset/common:/app/common
      - bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    ports:
      - "5173"
    volumes:
      - ./app/frontend:/app/frontend
    networks:
      - app-network
    command: pnpm run dev  --host
    stdin_open: true
    tty: true
volumes:
  bundler_cache:

networks:
  app-network:
    driver: bridge
