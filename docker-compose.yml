      - bundler_cache:/usr/local/bundle
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "idah.localhost:host-gateway"
    networks:
      - app-network
    command: ./dev-entrypoint.sh puma
    stdin_open: true
    tty: true

  sync:
    build:
      context: ./app/sync
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: "" # Allow all groups for dev.
        APP_ENVIRONMENT: development
    environment:
      - POSTGRES_HOST=host.docker.internal
      - REDIS_STREAM_URL=redis://host.docker.internal:6379/0
      - EAGER_LOAD=1
    ports:
