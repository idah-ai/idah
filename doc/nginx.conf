server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Preserve the original port in redirects
    port_in_redirect off;
    absolute_redirect off;

    # Add trailing slash for directories (but not for files with extensions)
    # This checks if the request is for a directory by testing if index.html exists
    if (-d $request_filename) {
        rewrite ^(.*[^/])$ $1/ permanent;
    }

    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Serve JSON files (OpenAPI docs) with correct content type
    location ~* \.json$ {
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable access logs for health checks
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
