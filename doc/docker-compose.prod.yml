services:
  idah-docs:
    container_name: idah-docs
    build:
      context: ../
      dockerfile: ./doc/Dockerfile
      args:
        # Override the SITE_URL during build
        SITE_URL: ${SITE_URL:-http://localhost:8080}
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
